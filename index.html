<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>金融学核心考点交互题库</title>
  <script>
    window.MathJax = {
      tex: { inlineMath: [["\\(", "\\)"], ["$", "$"]] },
      chtml: { matchFontHeight: false },
      startup: { typeset: false }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <style>
    :root {
      --bg: #f5f7fa;
      --paper: #ffffff;
      --ink: #1f2937;
      --muted: #667085;
      --line: #d7dee8;
      --soft: #eef6f6;
      --primary: #0f766e;
      --primary-dark: #0b5d56;
      --blue: #2563eb;
      --ok: #0f8a4b;
      --ok-bg: #e7f6ee;
      --bad: #c23b2a;
      --bad-bg: #fdece8;
      --warn: #b7791f;
      --warn-bg: #fff7db;
      --shadow: 0 12px 28px rgba(31, 41, 55, 0.08);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(15, 118, 110, 0.10), transparent 300px),
        var(--bg);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      line-height: 1.65;
    }

    button,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .page {
      width: min(1160px, calc(100% - 28px));
      margin: 0 auto;
      padding: 26px 0 54px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: end;
      padding: 10px 0 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.16;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 780px;
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 16px;
    }

    .summary {
      min-width: 320px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .metric {
      min-width: 0;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfdff;
    }

    .metric strong {
      display: block;
      font-size: 22px;
      line-height: 1.1;
    }

    .metric span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .progress {
      height: 10px;
      margin-top: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: #edf2f7;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--primary), var(--blue));
      transition: width 180ms ease;
    }

    .paper-switcher {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 14px 0;
    }

    .paper-tab {
      min-height: 76px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--ink);
      text-align: left;
      background: var(--paper);
      box-shadow: 0 8px 18px rgba(31, 41, 55, 0.05);
      transition: 160ms ease;
    }

    .paper-tab:hover {
      border-color: var(--primary);
      transform: translateY(-1px);
    }

    .paper-tab.active {
      border-color: var(--primary);
      background: var(--soft);
      box-shadow: inset 0 0 0 1px rgba(15, 118, 110, 0.15);
    }

    .paper-tab strong,
    .paper-tab span {
      display: block;
    }

    .paper-tab strong {
      font-size: 14px;
      line-height: 1.3;
    }

    .paper-tab span {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 12;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      margin-bottom: 10px;
      background: rgba(245, 247, 250, 0.90);
      backdrop-filter: blur(12px);
    }

    .tool-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .btn {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 8px 13px;
      color: var(--ink);
      background: var(--paper);
      transition: 160ms ease;
    }

    .btn:hover {
      border-color: var(--primary);
      color: var(--primary-dark);
    }

    .btn.primary {
      border-color: var(--primary);
      color: #fff;
      background: var(--primary);
    }

    .btn.primary:hover {
      color: #fff;
      filter: brightness(0.96);
    }

    .btn.active {
      border-color: var(--primary);
      color: var(--primary-dark);
      background: var(--soft);
    }

    .notice {
      display: none;
      margin: 12px 0;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: #344054;
      background: #fff;
    }

    .notice.show {
      display: block;
    }

    .section {
      margin-top: 24px;
      scroll-margin-top: 84px;
    }

    .section-head {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 23px;
      line-height: 1.25;
    }

    .section-head span {
      padding: 3px 9px;
      border-radius: 999px;
      color: var(--primary-dark);
      background: var(--soft);
      font-size: 13px;
    }

    .question-list,
    .subjective-list {
      display: grid;
      gap: 13px;
    }

    .question-card {
      padding: 17px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: 0 8px 20px rgba(31, 41, 55, 0.05);
    }

    .question-card.correct {
      border-color: rgba(15, 138, 75, 0.48);
      background: linear-gradient(0deg, rgba(231, 246, 238, 0.72), #fff 62%);
    }

    .question-card.wrong {
      border-color: rgba(194, 59, 42, 0.48);
      background: linear-gradient(0deg, rgba(253, 236, 232, 0.72), #fff 62%);
    }

    .q-top {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: start;
      margin-bottom: 12px;
    }

    .q-no {
      display: inline-grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border-radius: 999px;
      color: #fff;
      background: #344054;
      font-weight: 700;
      line-height: 1;
    }

    .q-text {
      margin: 0;
      font-weight: 700;
      line-height: 1.55;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      color: var(--muted);
      background: #f2f4f7;
      font-size: 12px;
      white-space: nowrap;
    }

    .tag.easy {
      color: #0f766e;
      background: #e6f5f2;
    }

    .tag.medium {
      color: #1d4ed8;
      background: #e8f0ff;
    }

    .options {
      display: grid;
      gap: 8px;
    }

    .option {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      align-items: center;
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 8px 12px 8px 8px;
      color: var(--ink);
      text-align: left;
      background: #fff;
      transition: 140ms ease;
    }

    .option:hover {
      border-color: var(--primary);
      background: #fbfffe;
    }

    .option.selected {
      border-color: var(--primary);
      background: var(--soft);
    }

    .option.right {
      border-color: var(--ok);
      background: var(--ok-bg);
    }

    .option.bad {
      border-color: var(--bad);
      background: var(--bad-bg);
    }

    .option.missed {
      border-color: var(--ok);
      background: var(--ok-bg);
      outline: 2px dashed rgba(15, 138, 75, 0.32);
      outline-offset: -4px;
    }

    .option-label {
      display: inline-grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      color: #344054;
      background: #eef2f6;
      font-weight: 700;
      line-height: 1;
    }

    .option-text {
      overflow-wrap: anywhere;
    }

    .q-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 12px;
    }

    .feedback {
      color: var(--muted);
      font-size: 14px;
    }

    .feedback.ok {
      color: var(--ok);
      font-weight: 700;
    }

    .feedback.bad {
      color: var(--bad);
      font-weight: 700;
    }

    .answer-panel {
      display: none;
      margin-top: 12px;
      padding: 12px 13px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: #344054;
      background: #f8fafc;
    }

    .answer-panel.show {
      display: block;
    }

    .answer-panel strong {
      color: var(--primary-dark);
    }

    .knowledge {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed #ccd6e2;
      color: var(--muted);
      font-size: 14px;
    }

    .subjective-card textarea {
      width: 100%;
      min-height: 118px;
      resize: vertical;
      margin-top: 8px;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--ink);
      background: #fff;
    }

    .scoring {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: var(--radius);
      background: var(--warn-bg);
      color: #5f450e;
      font-size: 14px;
    }

    .empty {
      padding: 24px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      text-align: center;
      background: #fff;
    }

    .mini-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0 0;
    }

    .mini-nav a {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      color: var(--muted);
      text-decoration: none;
      background: #fff;
      font-size: 13px;
    }

    .mini-nav a:hover {
      border-color: var(--primary);
      color: var(--primary-dark);
    }

    @media (max-width: 920px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .summary {
        min-width: 0;
      }

      .paper-switcher {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 20px, 1160px);
        padding-top: 18px;
      }

      .summary-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .paper-switcher {
        grid-template-columns: 1fr;
      }

      .toolbar {
        align-items: stretch;
      }

      .tool-group,
      .btn {
        width: 100%;
      }

      .q-top {
        grid-template-columns: auto 1fr;
      }

      .q-top .tag {
        grid-column: 2;
        width: fit-content;
      }

      .question-card {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="hero">
      <div>
        <h1>金融学核心考点交互题库</h1>
        <p class="subtitle">3 套期末复习卷，覆盖金融概述、货币信用、利率汇率、金融产品、金融机构、金融市场、中央银行、货币供求、货币政策、金融监管与宏观审慎管理。客观题自动判分，主观题提供参考答案。</p>
        <nav class="mini-nav" aria-label="题型导航">
          <a href="#single">单选题</a>
          <a href="#multiple">多选题</a>
          <a href="#judge">判断题</a>
          <a href="#subjective">主观题</a>
        </nav>
      </div>
      <aside class="summary" aria-label="当前套卷进度">
        <div class="summary-grid">
          <div class="metric">
            <strong id="checkedMetric">0/30</strong>
            <span>已批改</span>
          </div>
          <div class="metric">
            <strong id="scoreMetric">0</strong>
            <span>客观分</span>
          </div>
          <div class="metric">
            <strong id="rateMetric">0%</strong>
            <span>正确率</span>
          </div>
        </div>
        <div class="progress" aria-hidden="true">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </aside>
    </header>

    <section class="paper-switcher" id="paperSwitcher" aria-label="选择套卷"></section>

    <div class="toolbar">
      <div class="tool-group">
        <button class="btn primary" type="button" id="gradeAllBtn">一键批改</button>
        <button class="btn" type="button" id="resetBtn">重新做题</button>
      </div>
      <div class="tool-group">
        <button class="btn" type="button" id="wrongOnlyBtn">只看错题</button>
        <button class="btn" type="button" id="showAllBtn">显示全部解析</button>
      </div>
    </div>

    <div class="notice" id="notice"></div>
    <div id="content"></div>
  </main>

  <script>

          { id: "p1-j1", type: "judge", difficulty: "easy", question: "货币市场主要解决一年以内的短期资金融通问题。", options: ["正确", "错误"], answer: ["A"], explanation: "货币市场以短期金融工具为主，期限通常在一年以内。", knowledgePoint: "货币市场期限" },

        subjective: [
          { id: "p1-short1", type: "short", score: 5, question: "简述货币市场与资本市场的区别。", answer: "可从四方面回答：一是期限不同，货币市场一般是一年以内，资本市场一般是一年以上；二是功能不同，货币市场调剂短期资金余缺，资本市场促进长期投资和资本形成；三是风险收益不同，货币市场流动性强、风险收益较低，资本市场期限较长、风险收益较高；四是工具不同，货币市场包括同业拆借、回购、票据等，资本市场包括股票、公司债券和长期债券等。", scoringPoints: ["期限比较", "功能比较", "风险收益比较", "典型工具举例"], knowledgePoint: "金融市场分类" },
          { id: "p1-essay1", type: "essay", score: 5, question: "论述中央银行的一般职能。", answer: "中央银行的一般职能包括：发行的银行，负责货币发行并维护币值稳定；政府的银行，代理国库、管理政府存款并服务政府金融事务；银行的银行，集中存款准备金、办理清算并向商业银行提供再贷款、再贴现等支持；金融管理的银行，制定和执行货币政策，维护金融稳定并参与金融监管。", scoringPoints: ["发行的银行", "政府的银行", "银行的银行", "金融管理的银行"], knowledgePoint: "中央银行职能" },
          { id: "p1-calc1", type: "calculation", score: 5, question: "某商业银行收到原始存款 10000 元，法定存款准备金率为 10%。假设不存在现金漏损和超额准备金，计算第一轮法定准备金、第一轮可贷资金、新增派生存款总额和最终存款总额。", answer: "第一轮法定准备金：\\(10000\\times10\\%=1000\\) 元。\n第一轮可贷资金：\\(10000-1000=9000\\) 元。\n新增派生存款总额：\\(9000+8100+7290+6561+\\cdots=\\frac{9000}{1-0.9}=90000\\) 元。\n最终存款总额：\\(10000+90000=100000\\) 元。\n注意：90000 是新增派生存款总额，不包括最初的 10000 元原始存款；100000 才是最终存款总额。", scoringPoints: ["准备金计算", "可贷资金计算", "无穷等比数列求和", "区分派生存款与最终存款"], knowledgePoint: "存款货币创造" },
          { id: "p1-analysis1", type: "analysis", score: 5, question: "材料：经济出现需求不足、企业投资下降、物价低迷，政府计划增加基建投资并减税，央行准备降准并在公开市场买入证券。分析政策性质、适用形势和可能传导路径。", answer: "财政政策属于扩张性财政政策，货币政策属于扩张性货币政策。这种双扩张组合适用于需求不足、经济下行、通缩压力较大的情形。央行降准和买入证券会增加银行体系流动性，降低市场利率和融资成本，刺激投资与消费，并通过乘数效应提高总需求和国民收入。可用凯恩斯传导机制概括为 \\(M\\to r\\to I\\to E\\to Y\\)。", scoringPoints: ["判断双扩张", "说明适用经济形势", "解释流动性和利率变化", "写出传导机制"], knowledgePoint: "财政政策与货币政策搭配；货币政策传导机制" }

    const papers = allPapers.slice(0, 3);

    let appState = loadState();
    let currentPaperIndex = Number(localStorage.getItem("financeQuestionBankCurrentPaper") || 0);
    if (!papers[currentPaperIndex]) currentPaperIndex = 0;
    let showWrongOnly = false;
    let showAllExplanations = false;

    const content = document.getElementById("content");
    const paperSwitcher = document.getElementById("paperSwitcher");
    const notice = document.getElementById("notice");

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(storageKey)) || {};
      } catch (error) {
        return {};
      }
    }

    function saveState() {
      localStorage.setItem(storageKey, JSON.stringify(appState));
      localStorage.setItem("financeQuestionBankCurrentPaper", String(currentPaperIndex));
    }

    function currentPaper() {
      return papers[currentPaperIndex];
    }

    function paperAnswers() {
      const id = currentPaper().id;
      appState[id] ||= {};
      return appState[id];
    }

    function objectiveQuestions() {
      return currentPaper().questions;
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatText(value) {
      return escapeHTML(value).replace(/\n/g, "<br>");
    }

    function sameAnswer(a, b) {
      const left = [...a].sort();
      const right = [...b].sort();
      return left.length === right.length && left.every((item, index) => item === right[index]);
    }

    function getAnswerText(question) {
      return question.answer
        .map(letter => {
          const index = letters.indexOf(letter);
          const option = question.options[index] || "";
          return `${letter}. ${option}`;
        })
        .join("；");
    }

    function questionTypeText(type) {
      return { single: "单选", multiple: "多选", judge: "判断" }[type] || type;
    }

    function difficultyText(value) {
      return value === "medium" ? "中等" : "基础";
    }

    function subjectiveTypeText(type) {
      return { short: "简答", essay: "论述", calculation: "计算", analysis: "综合" }[type] || type;
    }

    function renderPaperSwitcher() {
      paperSwitcher.innerHTML = papers.map((paper, index) => `
        <button class="paper-tab ${index === currentPaperIndex ? "active" : ""}" type="button" data-paper-index="${index}">
          <strong>${escapeHTML(paper.label)}：${escapeHTML(paper.title)}</strong>
          <span>${escapeHTML(paper.description)}</span>
        </button>
      `).join("");
    }

    function render() {
      renderPaperSwitcher();
      const paper = currentPaper();
      const answers = paperAnswers();
      const groups = {
        single: paper.questions.filter(q => q.type === "single"),
        multiple: paper.questions.filter(q => q.type === "multiple"),
        judge: paper.questions.filter(q => q.type === "judge")
      };

      const filtered = {};
      Object.keys(groups).forEach(type => {
        filtered[type] = groups[type].filter(question => {
          const record = answers[question.id];
          return !showWrongOnly || (record && record.checked && !record.correct);
        });
      });

      const wrongCount = paper.questions.filter(q => answers[q.id]?.checked && !answers[q.id]?.correct).length;
      const sections = [
        renderObjectiveSection("single", "一、单项选择题", "每题 2 分，共 20 分", filtered.single, groups.single),
        renderObjectiveSection("multiple", "二、多项选择题", "每题 2 分，共 20 分，少选、多选、错选均不得分", filtered.multiple, groups.multiple),
        renderObjectiveSection("judge", "三、判断题", "每题 1 分，共 10 分", filtered.judge, groups.judge)
      ];

      const subjective = showWrongOnly
        ? `<section class="section"><div class="empty">当前为“只看错题”模式，主观题暂不显示。当前错题数：${wrongCount}。</div></section>`
        : renderSubjectiveSection(paper.subjective);

      content.innerHTML = sections.join("") + subjective;
      updateSummary();
      renderNotice();
      typesetMath();
    }

    function renderObjectiveSection(id, title, subtitle, questions, originalQuestions) {
      const list = questions.length
        ? questions.map((question, index) => renderQuestionCard(question, originalQuestions.indexOf(question) + 1)).join("")
        : `<div class="empty">${showWrongOnly ? "这一部分暂时没有错题。" : "暂无题目。"}</div>`;

      return `
        <section class="section" id="${id}">
          <div class="section-head">
            <h2>${title}</h2>
            <span>${subtitle}</span>
          </div>
          <div class="question-list">${list}</div>
        </section>
      `;
    }

    function renderQuestionCard(question, number) {
      const answers = paperAnswers();
      const record = answers[question.id] || { selected: [], checked: false, correct: false };
      const showPanel = showAllExplanations || (record.checked && !record.correct);
      const stateClass = record.checked ? (record.correct ? "correct" : "wrong") : "";
      const feedback = record.checked
        ? `<span class="feedback ${record.correct ? "ok" : "bad"}">${record.correct ? "回答正确" : "回答错误"}</span>`
        : `<span class="feedback">选好后点击“检查本题”。</span>`;

      return `
        <article class="question-card ${stateClass}" data-question-id="${question.id}">
          <div class="q-top">
            <span class="q-no">${number}</span>
            <p class="q-text">${formatText(question.question)}</p>
            <span class="tag ${question.difficulty}">${questionTypeText(question.type)} · ${difficultyText(question.difficulty)}</span>
          </div>
          <div class="options">
            ${question.options.map((option, index) => renderOption(question, record, option, index)).join("")}
          </div>
          <div class="q-actions">
            <button class="btn primary" type="button" data-check="${question.id}">检查本题</button>
            ${feedback}
          </div>
          <div class="answer-panel ${showPanel ? "show" : ""}">
            <div><strong>正确答案：</strong>${formatText(getAnswerText(question))}</div>
            <div><strong>解析：</strong>${formatText(question.explanation)}</div>
            <div class="knowledge"><strong>对应知识点：</strong>${formatText(question.knowledgePoint)}</div>
          </div>
        </article>
      `;
    }

    function renderOption(question, record, option, index) {
      const letter = letters[index];
      const selected = record.selected?.includes(letter);
      const checked = record.checked || showAllExplanations;
      let cls = selected ? "selected" : "";

      if (checked) {
        if (selected && question.answer.includes(letter)) cls += " right";
        if (selected && !question.answer.includes(letter)) cls += " bad";
        if (!selected && record.checked && !record.correct && question.answer.includes(letter)) cls += " missed";
        if (showAllExplanations && question.answer.includes(letter)) cls += " missed";
      }

      return `
        <button class="option ${cls}" type="button" data-option="${letter}" data-question-id="${question.id}">
          <span class="option-label">${letter}</span>
          <span class="option-text">${formatText(option)}</span>
        </button>
      `;
    }

    function renderSubjectiveSection(subjectiveQuestions) {
      return `
        <section class="section" id="subjective">
          <div class="section-head">
            <h2>四、主观题</h2>
            <span>约 20 分，不自动判分</span>
          </div>
          <div class="subjective-list">
            ${subjectiveQuestions.map((question, index) => renderSubjectiveCard(question, index + 1)).join("")}
          </div>
        </section>
      `;
    }

    function renderSubjectiveCard(question, number) {
      return `
        <article class="question-card subjective-card" data-subjective-id="${question.id}">
          <div class="q-top">
            <span class="q-no">${number}</span>
            <p class="q-text">${formatText(question.question)}</p>
            <span class="tag medium">${subjectiveTypeText(question.type)} · ${question.score} 分</span>
          </div>
          <textarea placeholder="先写下自己的答案，再查看参考答案。"></textarea>
          <div class="q-actions">
            <button class="btn" type="button" data-toggle-answer="${question.id}">查看参考答案</button>
            <span class="feedback">主观题建议按要点自评。</span>
          </div>
          <div class="answer-panel" id="answer-${question.id}">
            <div><strong>参考答案：</strong>${formatText(question.answer)}</div>
            <div class="scoring"><strong>评分要点：</strong>${question.scoringPoints.map(point => ` ${escapeHTML(point)}`).join("；")}</div>
            <div class="knowledge"><strong>对应知识点：</strong>${formatText(question.knowledgePoint)}</div>
          </div>
        </article>
      `;
    }

    function renderNotice() {
      const answers = paperAnswers();
      const questions = objectiveQuestions();
      const checked = questions.filter(q => answers[q.id]?.checked).length;
      const score = getObjectiveScore();
      const max = getObjectiveMaxScore();

      if (!checked) {
        notice.classList.remove("show");
        notice.textContent = "";
        return;
      }

      notice.classList.add("show");
      notice.textContent = `当前客观题得分：${score}/${max}。主观题约 20 分，请点击参考答案后按评分要点自评。`;
    }

    function getObjectiveScore() {
      const answers = paperAnswers();
      return objectiveQuestions().reduce((sum, question) => {
        const record = answers[question.id];
        return sum + (record?.checked && record.correct ? points[question.type] : 0);
      }, 0);
    }

    function getObjectiveMaxScore() {
      return objectiveQuestions().reduce((sum, question) => sum + points[question.type], 0);
    }

    function updateSummary() {
      const answers = paperAnswers();
      const questions = objectiveQuestions();
      const checked = questions.filter(q => answers[q.id]?.checked).length;
      const correct = questions.filter(q => answers[q.id]?.checked && answers[q.id]?.correct).length;
      const score = getObjectiveScore();
      const max = getObjectiveMaxScore();
      const rate = checked ? Math.round((correct / checked) * 100) : 0;
      const progress = Math.round((checked / questions.length) * 100);

      document.getElementById("checkedMetric").textContent = `${checked}/${questions.length}`;
      document.getElementById("scoreMetric").textContent = `${score}/${max}`;
      document.getElementById("rateMetric").textContent = `${rate}%`;
      document.getElementById("progressBar").style.width = `${progress}%`;
      document.getElementById("wrongOnlyBtn").classList.toggle("active", showWrongOnly);
      document.getElementById("showAllBtn").classList.toggle("active", showAllExplanations);
      document.getElementById("wrongOnlyBtn").textContent = showWrongOnly ? "显示全部题" : "只看错题";
      document.getElementById("showAllBtn").textContent = showAllExplanations ? "隐藏全部解析" : "显示全部解析";
    }

    function selectOption(questionId, letter) {
      const question = objectiveQuestions().find(item => item.id === questionId);
      if (!question) return;

      const answers = paperAnswers();
      const record = answers[questionId] || { selected: [], checked: false, correct: false };
      let selected;

      if (question.type === "multiple") {
        selected = record.selected?.includes(letter)
          ? record.selected.filter(item => item !== letter)
          : [...(record.selected || []), letter];
      } else {
        selected = [letter];
      }

      answers[questionId] = { selected: selected.sort(), checked: false, correct: false };
      saveState();
      render();
    }

    function checkQuestion(questionId, allowEmpty = false) {
      const question = objectiveQuestions().find(item => item.id === questionId);
      if (!question) return false;

      const answers = paperAnswers();
      const record = answers[questionId] || { selected: [], checked: false, correct: false };
      const selected = record.selected || [];

      if (!allowEmpty && selected.length === 0) {
        notice.classList.add("show");
        notice.textContent = "请先选择本题答案，再点击检查。";
        return false;
      }

      answers[questionId] = {
        selected: selected.sort(),
        checked: true,
        correct: sameAnswer(selected, question.answer)
      };
      saveState();
      return true;
    }

    function gradeAll() {
      objectiveQuestions().forEach(question => checkQuestion(question.id, true));
      showWrongOnly = false;
      saveState();
      render();
      notice.classList.add("show");
      notice.textContent = `已完成一键批改：客观题得分 ${getObjectiveScore()}/${getObjectiveMaxScore()}。主观题约 20 分，请按参考答案自评。`;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function resetCurrentPaper() {
      delete appState[currentPaper().id];
      showWrongOnly = false;
      showAllExplanations = false;
      saveState();
      render();
      notice.classList.add("show");
      notice.textContent = "已清空当前套卷作答记录，可以重新练习。";
    }

    function toggleSubjectiveAnswer(id) {
      const panel = document.getElementById(`answer-${id}`);
      const button = document.querySelector(`[data-toggle-answer="${id}"]`);
      if (!panel || !button) return;
      const shown = panel.classList.toggle("show");
      button.textContent = shown ? "收起参考答案" : "查看参考答案";
      typesetMath();
    }

    function typesetMath() {
      if (window.MathJax && window.MathJax.typesetPromise) {
        window.MathJax.typesetPromise([content]).catch(() => {});
      }
    }

    paperSwitcher.addEventListener("click", event => {
      const button = event.target.closest("[data-paper-index]");
      if (!button) return;
      currentPaperIndex = Number(button.dataset.paperIndex);
      showWrongOnly = false;
      showAllExplanations = false;
      saveState();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    content.addEventListener("click", event => {
      const option = event.target.closest("[data-option]");
      if (option) {
        selectOption(option.dataset.questionId, option.dataset.option);
        return;
      }

      const checker = event.target.closest("[data-check]");
      if (checker) {
        const ok = checkQuestion(checker.dataset.check, false);
        if (ok) render();
        return;
      }

      const answerToggle = event.target.closest("[data-toggle-answer]");
      if (answerToggle) {
        toggleSubjectiveAnswer(answerToggle.dataset.toggleAnswer);
      }
    });

    document.getElementById("gradeAllBtn").addEventListener("click", gradeAll);
    document.getElementById("resetBtn").addEventListener("click", resetCurrentPaper);
    document.getElementById("wrongOnlyBtn").addEventListener("click", () => {
      showWrongOnly = !showWrongOnly;
      render();
    });
    document.getElementById("showAllBtn").addEventListener("click", () => {
      showAllExplanations = !showAllExplanations;
      render();
    });

    render();
  </script>
</body>
</html>
