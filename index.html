<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>经济法真题刷题网站</title>
  <style>
    :root {
      --bg: #f6f2ea;
      --card: #ffffff;
      --text: #2c2c2c;
      --muted: #6b7280;
      --line: #e5e0d6;
      --primary: #1f4e79;
      --primary-soft: #e7f0fb;
      --good: #17803d;
      --good-bg: #e8f8ee;
      --bad: #b42318;
      --bad-bg: #fff0ed;
      --warn: #8a5b00;
      --warn-bg: #fff7db;
      --shadow: 0 10px 30px rgba(31, 78, 121, .08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background: linear-gradient(180deg, #faf7f1 0%, var(--bg) 100%);
      color: var(--text);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(12px);
      background: rgba(246, 242, 234, .86);
      border-bottom: 1px solid var(--line);
    }

    .topbar {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 18px 14px;
      display: grid;
      gap: 12px;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 4vw, 34px);
      letter-spacing: -.02em;
      color: #1f2937;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--card);
      border: 1px solid var(--line);
      color: #374151;
      font-size: 13px;
      box-shadow: 0 4px 12px rgba(0,0,0,.03);
    }

    .pill strong { color: var(--primary); }

    .progress-wrap {
      height: 10px;
      background: #e8e1d5;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid #ddd5c8;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #1f4e79, #4f88bd);
      transition: width .25s ease;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 20px 18px 54px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
    }

    aside {
      position: sticky;
      top: 126px;
      align-self: start;
      max-height: calc(100vh - 150px);
      overflow: auto;
      padding: 14px;
      background: rgba(255,255,255,.7);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .controls {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }

    .control-row {
      display: grid;
      gap: 8px;
    }

    input[type="search"], select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      outline: none;
      font-size: 14px;
    }

    input[type="search"]:focus, select:focus {
      border-color: #7aa6d2;
      box-shadow: 0 0 0 3px rgba(31,78,121,.12);
    }

    .btn {
      appearance: none;
      border: 1px solid transparent;
      background: var(--primary);
      color: #fff;
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .1s ease, opacity .1s ease, background .2s ease;
    }

    .btn:hover { opacity: .92; }
    .btn:active { transform: translateY(1px); }

    .btn.secondary {
      background: #fff;
      color: var(--primary);
      border-color: #bfd1e2;
    }

    .btn.danger {
      background: #fff;
      color: var(--bad);
      border-color: #f0b5ae;
    }

    .small-title {
      font-weight: 800;
      font-size: 13px;
      color: #374151;
      margin: 12px 0 8px;
    }

    .nav-list {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .nav-btn {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      padding: 7px 0;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      color: #4b5563;
    }

    .nav-btn.done.correct {
      background: var(--good-bg);
      border-color: #a7e2bd;
      color: var(--good);
    }
    .nav-btn.done.wrong {
      background: var(--bad-bg);
      border-color: #ffc1b8;
      color: var(--bad);
    }
    .nav-btn.hidden { display: none; }

    .quiz {
      display: grid;
      gap: 16px;
    }

    .section-heading {
      margin: 12px 0 0;
      padding: 12px 16px;
      background: var(--primary-soft);
      color: var(--primary);
      border: 1px solid #c7daed;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 900;
    }

    .question-card {
      background: rgba(255,255,255,.86);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      scroll-margin-top: 155px;
    }

    .question-card.hidden { display: none; }

    .q-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .q-id {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 900;
      color: var(--primary);
    }

    .q-type {
      font-size: 12px;
      border: 1px solid #c7daed;
      background: var(--primary-soft);
      color: var(--primary);
      padding: 4px 8px;
      border-radius: 999px;
      font-weight: 800;
    }

    .q-status {
      font-size: 12px;
      font-weight: 800;
      padding: 4px 8px;
      border-radius: 999px;
      color: var(--muted);
      background: #f4f4f5;
    }

    .q-status.correct {
      color: var(--good);
      background: var(--good-bg);
    }
    .q-status.wrong {
      color: var(--bad);
      background: var(--bad-bg);
    }

    .question-text {
      font-size: 17px;
      line-height: 1.75;
      font-weight: 750;
      margin: 0 0 14px;
    }

    .options {
      display: grid;
      gap: 10px;
      margin: 12px 0;
    }

    .option {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 12px 13px;
      border: 1px solid #e4e4e7;
      border-radius: 14px;
      background: #fff;
      cursor: pointer;
      line-height: 1.6;
      transition: border .15s ease, background .15s ease, transform .08s ease;
    }

    .option:hover {
      border-color: #b7cde4;
      background: #fbfdff;
    }

    .option input {
      margin-top: 5px;
      accent-color: var(--primary);
      flex: 0 0 auto;
    }

    .option.correct-answer {
      border-color: #9dd9b4;
      background: var(--good-bg);
    }

    .option.wrong-answer {
      border-color: #ffb6ad;
      background: var(--bad-bg);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .feedback {
      display: none;
      margin-top: 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      overflow: hidden;
      background: #fff;
    }

    .feedback.show { display: block; }

    .result-line {
      padding: 12px 14px;
      font-weight: 900;
    }
    .result-line.correct {
      color: var(--good);
      background: var(--good-bg);
      border-bottom: 1px solid #bce8ca;
    }
    .result-line.wrong {
      color: var(--bad);
      background: var(--bad-bg);
      border-bottom: 1px solid #ffc5bc;
    }

    details.analysis {
      padding: 0;
    }

    details.analysis summary {
      cursor: pointer;
      padding: 12px 14px;
      font-weight: 900;
      color: #374151;
      background: #fafafa;
    }

    .analysis-body {
      padding: 14px;
      color: #374151;
      line-height: 1.8;
      border-top: 1px solid #eee;
    }

    .answer-box {
      display: inline-block;
      font-weight: 900;
      color: var(--primary);
      background: var(--primary-soft);
      border: 1px solid #c7daed;
      padding: 2px 8px;
      border-radius: 8px;
    }

    .note {
      background: var(--warn-bg);
      border: 1px solid #f4d47a;
      color: #5f4300;
      padding: 10px 12px;
      border-radius: 12px;
      margin-top: 10px;
    }

    .empty {
      display: none;
      padding: 28px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.7);
    }

    .empty.show { display: block; }

    footer {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 18px 40px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 900px) {
      main {
        grid-template-columns: 1fr;
      }
      aside {
        position: static;
        max-height: none;
      }
      .nav-list {
        grid-template-columns: repeat(6, 1fr);
      }
    }

    @media (max-width: 520px) {
      .question-card {
        padding: 16px;
      }
      .nav-list {
        grid-template-columns: repeat(4, 1fr);
      }
      .q-head {
        align-items: flex-start;
        flex-direction: column;
      }
      .btn {
        width: 100%;
      }
      .actions {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="title-row">
        <div>
          <h1>经济法真题刷题网站</h1>
          <div class="subtitle">共39题：单选17题 + 多选22题。支持自动判分、错题筛选、显示正确答案与折叠解析。</div>
        </div>
        <div class="stats">
          <div class="pill">已作答：<strong id="answeredCount">0</strong>/39</div>
          <div class="pill">正确：<strong id="correctCount">0</strong></div>
          <div class="pill">错误：<strong id="wrongCount">0</strong></div>
          <div class="pill">正确率：<strong id="accuracy">0%</strong></div>
        </div>
      </div>
      <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
    </div>
  </header>

  <main>
    <aside>
      <div class="controls">
        <div class="control-row">
          <input type="search" id="searchInput" placeholder="搜索题号 / 关键词，例如 S07、合伙、出质" />
        </div>
        <div class="control-row">
          <select id="typeFilter">
            <option value="all">全部题目</option>
            <option value="single">只看单选</option>
            <option value="multiple">只看多选</option>
          </select>
        </div>
        <button class="btn secondary" id="wrongOnlyBtn">显示仅错题</button>
        <button class="btn secondary" id="showAllBtn">显示全部</button>
        <button class="btn danger" id="resetBtn">重置作答</button>
      </div>

      <div class="small-title">题目定位</div>
      <div class="nav-list" id="navList"></div>
    </aside>

    <section class="quiz" id="quiz">
      <div class="section-heading" id="singleHeading">单选题｜17题</div>
      <div id="singleContainer"></div>
      <div class="section-heading" id="multipleHeading">多选题｜22题</div>
      <div id="multipleContainer"></div>
      <div class="empty" id="emptyState">当前筛选条件下没有题目。</div>
    </section>
  </main>

  <footer>
    本题库根据经济法真题整理，仅供期末复习使用。题量核对：单选17题，多选22题，合计39题。
  </footer>

  <script>
    const QUESTIONS = [
  {
    "id": "S01",
    "type": "single",
    "section": "单选题",
    "title": "经济法调整对象",
    "question": "以下不属于经济法调整对象的是",
    "options": [
      "A. 经济管理关系",
      "B. 经济协作关系",
      "C. 经济组织内部的经济关系",
      "D. 平等主体之间的人身关系"
    ],
    "answer": [
      "D"
    ],
    "analysis": "经济法调整对象主要包括经济管理关系、经济协作关系、经济组织内部经济关系。平等主体之间的人身关系通常属于民法等部门法调整，不属于经济法调整对象。",
    "tip": "“平等主体”不一定排除经济法，但“人身关系”不是经济法重点。"
  },
  {
    "id": "S02",
    "type": "single",
    "section": "单选题",
    "title": "经济法最本质特征",
    "question": "下列关于经济法最本质的特征，正确的是",
    "options": [
      "A. 经济性",
      "B. 政策性",
      "C. 综合性",
      "D. 社会性"
    ],
    "answer": [
      "A"
    ],
    "analysis": "经济法直接服务于经济运行、经济管理和市场秩序维护，因此最本质特征是经济性。",
    "tip": "题干出现“最本质”，直接锁定经济性。"
  },
  {
    "id": "S03",
    "type": "single",
    "section": "单选题",
    "title": "经济法调整对象排除项",
    "question": "下列各项关系中，不属于我国《经济法》调整对象的是",
    "options": [
      "A. 国家在市场监管中与经营者形成的关系",
      "B. 企业内部的组织与管理关系",
      "C. 国家为调节总供求而实施的财政、税收等宏观调控关系",
      "D. 家庭成员之间因遗产继承产生的财产关系"
    ],
    "answer": [
      "D"
    ],
    "analysis": "A属于经济管理关系，B属于经济组织内部经济关系，C属于宏观调控关系。遗产继承关系属于民事法律关系，不属于经济法调整对象。",
    "tip": "家庭、继承、婚姻、人身关系一般不属于经济法。"
  },
  {
    "id": "S04",
    "type": "single",
    "section": "单选题",
    "title": "法人判断",
    "question": "如下列组织中，在法律上属于“法人”的是",
    "options": [
      "A. 个体工商户",
      "B. 某大学法学院学生会",
      "C. 华为技术有限公司",
      "D. 张三个人开办的未经登记的英语培训班"
    ],
    "answer": [
      "C"
    ],
    "analysis": "有限公司是典型企业法人。个体工商户不是法人；学生会通常不是独立法人；未经登记的培训班也不是法人。",
    "tip": "“组织”不等于“法人”。法人必须依法成立并能独立承担责任。"
  },
  {
    "id": "S05",
    "type": "single",
    "section": "单选题",
    "title": "经济法律关系主体",
    "question": "下列各项中，不属于我国经济法律关系主体的是",

      "A. 股份有限公司的董事会",

      "D. 签订买卖合同的个人消费者"
    ],
    "answer": [
      "A"
    ],
    "analysis": "经济法律关系主体可以是国家机关、企业、自然人等。董事会是公司内部机构，一般不是独立经济法律关系主体。",
    "tip": "公司是主体；董事会通常只是公司内部机关。"
  },
  {
    "id": "S06",
    "type": "single",
    "section": "单选题",
    "title": "一人有限责任公司财产混同",
    "question": "甲成立一人有限责任公司，甲将一人有限责任公司的收益100万元给自己买了一套房，后甲公司欠乙公司50万元货款到期未支付，乙公司要求甲支付，甲拒绝，同时甲成立的一人有限责任公司无其他财产，乙应如何做？",
    "options": [
      "A. 乙只能申请甲所成立的一人有限责任公司破产",
      "B. 乙可以要求甲与甲成立的一人有限责任公司对其债务承担连带责任",
      "C. 乙直接占有甲的房子",
      "D. 乙只能到相关部门举报甲，要求撤销营业执照"
    ],
    "answer": [
      "B"
    ],
    "analysis": "一人有限责任公司的股东不能证明公司财产独立于自己财产的，应当对公司债务承担连带责任。甲将公司收益用于个人购房，存在财产混同风险。",
    "tip": "一人公司允许设立，但最怕财产混同；混同时股东可能承担连带责任。"
  },
  {
    "id": "S07",
    "type": "single",
    "section": "单选题",
    "title": "股份有限公司发起人",
    "question": "小王、小李等五人发起设立某股份有限责任公司，下列关于股份有限公司发起人，说法正确的是",

      "A. 中国发起设立股份有限责任公司，发起人必须是中国人",

      "D. 发起人不仅人数应在2人以上200以下，同时发起人须半数以上在中国境内有住所"

    "answer": [
      "D"

    "analysis": "按题库口径，股份有限公司发起人人数为2人以上200人以下，且半数以上发起人在中国境内有住所。",
    "tip": "该题按题库口径记D。若课堂采用现行公司法新口径，以老师要求为准。"

  {
    "id": "S08",
    "type": "single",
    "section": "单选题",
    "title": "公司出资方式",
    "question": "甲、乙、丙、丁欲共同出资设立一有限责任公司，他们的出资方式中不符合《公司法》要求的是",

      "A. 甲以货币出资50万元",
      "B. 乙以一套房产出资，经评估作价100万元",
      "C. 丙以劳务出资，作价5万元",
      "D. 丁以其拥有的一项专利技术出资，作价10万元"

    "answer": [
      "C"
    ],
    "analysis": "有限责任公司股东可以用货币、实物、知识产权、土地使用权等可以估价并依法转让的财产出资，但不得以劳务出资。",

  {

    "options": [

      "B. 连续90日以上单独或者合计持有公司10%以上股份的股东",
      "C. 连续180日以上单独或者合计持有公司1%以上股份的股东",
      "D. 连续180日以上单独或者合计持有公司10%以上股份的股东"
    ],
    "answer": [
      "B"
    ],
    "analysis": "股东会召集顺序为董事会、监事会、连续90日以上单独或者合计持有公司10%以上股份的股东。",

  },
  {
    "id": "S10",
    "type": "single",
    "section": "单选题",
    "title": "有限责任公司债务承担",

    const state = {
      answers: {},
      checked: {},
      wrongOnly: false,
      typeFilter: 'all',
      search: ''
    };

    const el = (id) => document.getElementById(id);

    function letterFromOption(optionText) {
      return optionText.trim().slice(0, 1).toUpperCase();
    }

    function arraysEqualAsSet(a, b) {
      if (a.length !== b.length) return false;
      const A = [...a].sort();
      const B = [...b].sort();
      return A.every((v, i) => v === B[i]);
    }

    function getQuestionResult(q) {
      const selected = state.answers[q.id] || [];
      if (!state.checked[q.id]) return null;
      return arraysEqualAsSet(selected, q.answer);
    }

    function render() {
      renderNav();
      const single = el('singleContainer');
      const multiple = el('multipleContainer');
      single.innerHTML = '';
      multiple.innerHTML = '';

      const filtered = getFilteredQuestions();

      QUESTIONS.forEach(q => {
        const card = createQuestionCard(q);
        if (!filtered.includes(q)) card.classList.add('hidden');
        if (q.type === 'single') single.appendChild(card);
        else multiple.appendChild(card);
      });

      const visibleSingle = filtered.some(q => q.type === 'single');
      const visibleMultiple = filtered.some(q => q.type === 'multiple');
      el('singleHeading').style.display = visibleSingle ? 'block' : 'none';
      el('multipleHeading').style.display = visibleMultiple ? 'block' : 'none';
      el('emptyState').classList.toggle('show', filtered.length === 0);

      updateStats();
    }

    function getFilteredQuestions() {
      const search = state.search.trim().toLowerCase();

      return QUESTIONS.filter(q => {
        if (state.typeFilter !== 'all' && q.type !== state.typeFilter) return false;

        if (state.wrongOnly) {
          const result = getQuestionResult(q);
          if (result !== false) return false;
        }

        if (search) {
          const hay = [
            q.id, q.section, q.title, q.question,
            ...q.options,
            q.answer.join(''),
            q.analysis,
            q.tip
          ].join(' ').toLowerCase();
          if (!hay.includes(search)) return false;
        }

        return true;
      });
    }

    function createQuestionCard(q) {
      const card = document.createElement('article');
      card.className = 'question-card';
      card.id = q.id;

      const result = getQuestionResult(q);
      const statusClass = result === null ? '' : (result ? 'correct' : 'wrong');
      const statusText = result === null ? '未作答' : (result ? '正确' : '错误');
      const inputType = q.type === 'single' ? 'radio' : 'checkbox';
      const selected = state.answers[q.id] || [];

      card.innerHTML = `
        <div class="q-head">
          <div class="q-id"><span>${q.id}</span><span>${q.title}</span></div>
          <div>
            <span class="q-type">${q.type === 'single' ? '单选题' : '多选题'}</span>
            <span class="q-status ${statusClass}">${statusText}</span>
          </div>
        </div>
        <p class="question-text">${escapeHTML(q.question)}</p>
        <div class="options">
          ${q.options.map(opt => {
            const letter = letterFromOption(opt);
            const isSelected = selected.includes(letter);
            const isCorrectAnswer = state.checked[q.id] && q.answer.includes(letter);
            const isWrongSelected = state.checked[q.id] && isSelected && !q.answer.includes(letter);
            const cls = isCorrectAnswer ? ' correct-answer' : (isWrongSelected ? ' wrong-answer' : '');
            return `
              <label class="option${cls}">
                <input type="${inputType}" name="${q.id}" value="${letter}" ${isSelected ? 'checked' : ''} />
                <span>${escapeHTML(opt)}</span>
              </label>
            `;
          }).join('')}
        </div>
        <div class="actions">
          <button class="btn" data-action="check" data-id="${q.id}">提交并判断</button>
          <button class="btn secondary" data-action="show" data-id="${q.id}">直接看答案</button>
          <button class="btn secondary" data-action="clear" data-id="${q.id}">清空本题</button>
        </div>
        <div class="feedback ${state.checked[q.id] ? 'show' : ''}">
          <div class="result-line ${statusClass}">
            ${state.checked[q.id] ? (result ? '回答正确' : '回答错误') : ''}
            <span style="margin-left:10px;">正确答案：<span class="answer-box">${q.answer.join('、')}</span></span>
          </div>
          <details class="analysis" ${state.checked[q.id] ? 'open' : ''}>
            <summary>展开/收起解析</summary>
            <div class="analysis-body">
              <p><strong>解析：</strong>${escapeHTML(q.analysis)}</p>
              <div class="note"><strong>易错点：</strong>${escapeHTML(q.tip)}</div>
            </div>
          </details>
        </div>
      `;

      card.querySelectorAll('input').forEach(input => {
        input.addEventListener('change', (e) => {
          const current = state.answers[q.id] || [];
          if (q.type === 'single') {
            state.answers[q.id] = [e.target.value];
          } else {
            if (e.target.checked) {
              state.answers[q.id] = [...new Set([...current, e.target.value])];
            } else {
              state.answers[q.id] = current.filter(v => v !== e.target.value);
            }
          }
          saveState();
          updateStats();
        });
      });

      card.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          const action = btn.dataset.action;
          if (action === 'check') checkQuestion(q.id);
          if (action === 'show') showAnswer(q.id);
          if (action === 'clear') clearQuestion(q.id);
        });
      });

      return card;
    }

    function escapeHTML(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function checkQuestion(id) {
      const q = QUESTIONS.find(x => x.id === id);
      if (!state.answers[id] || state.answers[id].length === 0) {
        alert('请先选择答案。');
        return;
      }
      state.checked[id] = true;
      saveState();
      render();
      document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function showAnswer(id) {
      state.checked[id] = true;
      if (!state.answers[id]) state.answers[id] = [];
      saveState();
      render();
      document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function clearQuestion(id) {
      delete state.answers[id];
      delete state.checked[id];
      saveState();
      render();
      document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function renderNav() {
      const nav = el('navList');
      nav.innerHTML = '';
      const filtered = getFilteredQuestions();

      QUESTIONS.forEach(q => {
        const result = getQuestionResult(q);
        const btn = document.createElement('button');
        btn.className = 'nav-btn';
        if (state.checked[q.id]) {
          btn.classList.add('done', result ? 'correct' : 'wrong');
        }
        if (!filtered.includes(q)) btn.classList.add('hidden');
        btn.textContent = q.id;
        btn.title = q.title;
        btn.addEventListener('click', () => {
          state.wrongOnly = false;
          el('wrongOnlyBtn').textContent = '显示仅错题';
          saveState(false);
          render();
          setTimeout(() => document.getElementById(q.id)?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
        });
        nav.appendChild(btn);
      });
    }

    function updateStats() {
      let answered = 0, correct = 0, wrong = 0;
      QUESTIONS.forEach(q => {
        if (state.checked[q.id]) {
          answered++;
          if (getQuestionResult(q)) correct++;
          else wrong++;
        }
      });
      el('answeredCount').textContent = answered;
      el('correctCount').textContent = correct;
      el('wrongCount').textContent = wrong;
      el('accuracy').textContent = answered ? Math.round(correct / answered * 100) + '%' : '0%';
      el('progressBar').style.width = Math.round(answered / QUESTIONS.length * 100) + '%';
    }

    function saveState(includeFilters = true) {
      const data = {
        answers: state.answers,
        checked: state.checked,
        wrongOnly: includeFilters ? state.wrongOnly : false,
        typeFilter: state.typeFilter,
        search: state.search
      };
      localStorage.setItem('econLawQuizState', JSON.stringify(data));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem('econLawQuizState');
        if (!raw) return;
        const data = JSON.parse(raw);
        state.answers = data.answers || {};
        state.checked = data.checked || {};
        state.wrongOnly = !!data.wrongOnly;
        state.typeFilter = data.typeFilter || 'all';
        state.search = data.search || '';
      } catch (e) {
        console.warn('无法读取本地进度', e);
      }
    }

    el('searchInput').addEventListener('input', (e) => {
      state.search = e.target.value;
      saveState();
      render();
    });

    el('typeFilter').addEventListener('change', (e) => {
      state.typeFilter = e.target.value;
      saveState();
      render();
    });

    el('wrongOnlyBtn').addEventListener('click', () => {
      state.wrongOnly = !state.wrongOnly;
      el('wrongOnlyBtn').textContent = state.wrongOnly ? '取消仅错题' : '显示仅错题';
      saveState();
      render();
    });

    el('showAllBtn').addEventListener('click', () => {
      state.wrongOnly = false;
      state.typeFilter = 'all';
      state.search = '';
      el('searchInput').value = '';
      el('typeFilter').value = 'all';
      el('wrongOnlyBtn').textContent = '显示仅错题';
      saveState();
      render();
    });

    el('resetBtn').addEventListener('click', () => {
      if (!confirm('确定要清空全部作答记录吗？')) return;
      state.answers = {};
      state.checked = {};
      state.wrongOnly = false;
      state.typeFilter = 'all';
      state.search = '';
      el('searchInput').value = '';
      el('typeFilter').value = 'all';
      el('wrongOnlyBtn').textContent = '显示仅错题';
      saveState();
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    loadState();
    el('searchInput').value = state.search;
    el('typeFilter').value = state.typeFilter;
    el('wrongOnlyBtn').textContent = state.wrongOnly ? '取消仅错题' : '显示仅错题';
    render();
  </script>
</body>
</html>
