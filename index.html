<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>题库互动练习网站</title>
  <style>
    :root {
      --bg:#f6f7fb; --card:#ffffff; --text:#18202f; --muted:#6b7280; --line:#e5e7eb;
      --main:#1f4f82; --main2:#2563eb; --ok:#108a44; --bad:#c2410c; --warn:#a16207;
      --shadow:0 14px 40px rgba(18,38,63,.10); --radius:18px;
    }
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(180deg,#eef4ff 0,#f7f7fb 220px);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;color:var(--text)}
    .wrap{max-width:1120px;margin:0 auto;padding:24px 16px 48px}
    header{display:flex;gap:18px;align-items:flex-end;justify-content:space-between;margin:8px 0 18px}
    h1{font-size:28px;line-height:1.2;margin:0;color:#10233f;letter-spacing:.5px}
    .sub{font-size:13px;color:var(--muted);margin-top:7px}
    .pillbar{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end}
    .pill{background:#fff;border:1px solid #dbe3ef;border-radius:999px;padding:7px 11px;font-size:12px;color:#344054;box-shadow:0 5px 18px rgba(16,24,40,.04)}
    .panel{background:rgba(255,255,255,.88);border:1px solid #e8edf5;border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin:14px 0}
    .filters{display:grid;grid-template-columns:1fr 1fr 1.3fr 1.3fr;gap:10px}
    label.small{font-size:12px;color:var(--muted);display:block;margin-bottom:5px}
    select,input[type="text"]{width:100%;border:1px solid #d7deea;border-radius:12px;background:#fff;padding:10px 11px;font-size:14px;color:var(--text);outline:none}
    select:focus,input:focus{border-color:#7aa4ff;box-shadow:0 0 0 3px rgba(37,99,235,.10)}
    .switches{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:12px}
    .checkline{display:flex;gap:7px;align-items:center;font-size:14px;color:#27364a;background:#f8fafc;border:1px solid #e5edf6;border-radius:999px;padding:8px 11px;user-select:none}
    .checkline input{width:16px;height:16px}
    .toolbar{display:flex;flex-wrap:wrap;gap:9px;align-items:center;justify-content:space-between}
    .btns{display:flex;gap:8px;flex-wrap:wrap}
    button{border:0;border-radius:12px;padding:10px 14px;font-size:14px;cursor:pointer;background:#eef2f7;color:#1f2937;transition:.15s;touch-action:manipulation}
    button:hover{transform:translateY(-1px);box-shadow:0 8px 18px rgba(16,24,40,.08)}
    button.primary{background:var(--main2);color:#fff}
    button.dark{background:#10233f;color:#fff}
    button.ghost{background:#fff;border:1px solid #d9e1ee}
    button.warn{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa}
    button:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
    .progressbox{display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-size:13px;color:var(--muted)}
    .bar{width:180px;height:9px;background:#e5e7eb;border-radius:999px;overflow:hidden}
    .bar>span{display:block;height:100%;width:0;background:linear-gradient(90deg,#2563eb,#16a34a);transition:.2s}
    .card{background:var(--card);border:1px solid #e8edf5;border-radius:22px;box-shadow:var(--shadow);padding:24px;margin-top:14px}
    .meta{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
    .tag{display:inline-flex;align-items:center;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-size:12px;padding:6px 10px;border:1px solid #dbeafe}
    .tag.multi{background:#f5f3ff;color:#6d28d9;border-color:#ddd6fe}
    .tag.judge{background:#ecfdf5;color:#047857;border-color:#bbf7d0}
    .tag.diff{background:#f8fafc;color:#475569;border-color:#e2e8f0}
    .qtitle{font-size:20px;line-height:1.65;font-weight:700;margin:8px 0 16px;white-space:pre-wrap}
    .options{display:grid;gap:10px;margin:14px 0}
    .opt{display:flex;gap:10px;align-items:flex-start;border:1px solid #e0e7f2;background:#fff;border-radius:14px;padding:13px;cursor:pointer;transition:.12s}
    .opt:hover{border-color:#93b4ff;background:#f8fbff}
    .opt input{margin-top:3px;min-width:18px;min-height:18px}
    .letter{font-weight:800;color:#1f4f82;min-width:26px}
    .otext{line-height:1.55}
    .opt.correct{border-color:#86efac;background:#f0fdf4}
    .opt.wrong{border-color:#fdba74;background:#fff7ed}
    .answer{display:none;margin-top:14px;padding:14px 16px;border-radius:16px;background:#f8fafc;border:1px dashed #cbd5e1;line-height:1.65}
    .answer.show{display:block}
    .answer .red{color:#b91c1c;font-weight:800}
    .result{min-height:22px;font-weight:700;margin-top:10px}
    .result.ok{color:var(--ok)} .result.bad{color:var(--bad)} .result.warn{color:var(--warn)}
    .note{margin-top:10px;color:#8a4b00;background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:10px;font-size:13px;line-height:1.55}
    .empty{padding:36px;text-align:center;color:var(--muted)}
    .statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0}
    .stat{background:#fff;border:1px solid #e7edf6;border-radius:16px;padding:13px;box-shadow:0 8px 22px rgba(16,24,40,.04)}
    .stat .n{font-size:22px;font-weight:900;color:#10233f} .stat .k{font-size:12px;color:var(--muted);margin-top:3px}
    .list{display:none;margin-top:14px}
    .list.show{display:block}
    .listitem{border:1px solid #e5e7eb;background:#fff;border-radius:14px;padding:12px;margin-bottom:9px}
    .listitem h3{font-size:15px;margin:0 0 8px;line-height:1.45}
    .listitem .mini{font-size:12px;color:var(--muted);margin-bottom:8px}
    @media (max-width:820px){.filters{grid-template-columns:1fr} header{align-items:flex-start;flex-direction:column} .pillbar{justify-content:flex-start} .statgrid{grid-template-columns:repeat(2,1fr)} .toolbar{align-items:flex-start} .qtitle{font-size:18px} .card{padding:18px}}
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>题库互动练习网站</h1>
      <div class="sub">支持单选、多选、判断；可筛选错题；答案默认隐藏，点击后显示。</div>
    </div>
    <div class="pillbar">
      <span class="pill">总题量 <b id="totalPill">0</b></span>
      <span class="pill">本机自动保存练习记录</span>
      <span class="pill">离线可用</span>
    </div>
  </header>

  <section class="panel">
    <div class="filters">
      <div><label class="small">资料</label><select id="sourceSel"><option value="all">全部资料</option></select></div>
      <div><label class="small">题型</label><select id="typeSel"><option value="all">全部题型</option><option value="单选">单选</option><option value="多选">多选</option><option value="判断">判断</option></select></div>
      <div><label class="small">章节</label><select id="chapterSel"><option value="all">全部章节</option></select></div>
      <div><label class="small">搜索题干/答案</label><input id="searchInput" type="text" placeholder="输入关键词，例如：群众路线"></div>
    </div>
    <div class="switches">
      <label class="checkline"><input id="wrongOnly" type="checkbox"> 仅看错题</label>
      <label class="checkline"><input id="unansweredOnly" type="checkbox"> 仅看未做</label>
      <label class="checkline"><input id="shuffleMode" type="checkbox"> 随机顺序</label>
      <label class="checkline"><input id="autoShow" type="checkbox"> 提交后自动显示答案</label>
    </div>
  </section>

  <section class="statgrid">
    <div class="stat"><div class="n" id="statTotal">0</div><div class="k">当前筛选题量</div></div>
    <div class="stat"><div class="n" id="statDone">0</div><div class="k">已做</div></div>
    <div class="stat"><div class="n" id="statRight">0</div><div class="k">答对</div></div>
    <div class="stat"><div class="n" id="statWrong">0</div><div class="k">错题</div></div>
  </section>

  <section class="panel toolbar">
    <div class="progressbox">
      <span id="posText">第 0 / 0 题</span>
      <div class="bar"><span id="barFill"></span></div>
      <span id="recordText">本机记录：0题</span>
    </div>
    <div class="btns">
      <button class="ghost" id="prevBtn">上一题</button>
      <button class="ghost" id="nextBtn">下一题</button>
      <button class="primary" id="submitBtn">提交答案</button>
      <button class="dark" id="showBtn">显示正确答案</button>
      <button class="warn" id="markWrongBtn">加入错题</button>
      <button class="ghost" id="toggleListBtn">展开题目列表</button>
      <button class="ghost" id="resetBtn">清空记录</button>
    </div>
  </section>

  <main id="quizCard" class="card"></main>
  <section id="listBox" class="list"></section>
</div>
<script>

const BUILD_STATS = {"total": 1515, "bySourceType": {"习思题库-单选": 187, "习思题库-多选": 139, "毛概PDF-单选": 444, "毛概PDF-多选": 310, "毛概PDF-判断": 435}};
const $ = (id)=>document.getElementById(id);
const LS_KEY = 'maogai_xisi_quiz_records_v1';
let records = loadRecords();
let filtered = [];
let current = 0;
let showAnswer = false;
let showingList = false;

function loadRecords(){
  try{ return JSON.parse(localStorage.getItem(LS_KEY) || '{}'); }catch(e){ return {}; }
}
function saveRecords(){ localStorage.setItem(LS_KEY, JSON.stringify(records)); }
function normLetters(arr){ return [...new Set(arr)].sort().join(''); }
function getSelected(){
  const inputs = [...document.querySelectorAll('.ansInput:checked')];
  return normLetters(inputs.map(i=>i.value));
}
function recordOf(q){ return records[q.id] || null; }
function statusOf(q){ const r=recordOf(q); return r ? r.status : 'unanswered'; }
function isMulti(q){ return q.type === '多选' || (q.answer && q.answer.length > 1 && q.type !== '判断'); }
function isJudge(q){ return q.type === '判断'; }
function escapeHtml(str){ return String(str ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
function uniq(arr){ return [...new Set(arr)].filter(Boolean); }

function initFilters(){
  const sources = uniq(QUESTIONS.map(q=>q.source));
  for(const s of sources) $('sourceSel').insertAdjacentHTML('beforeend', `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`);
  updateChapterOptions();
}
function updateChapterOptions(){
  const source = $('sourceSel').value;
  const type = $('typeSel').value;
  const currentChap = $('chapterSel').value;
  let qs = QUESTIONS.filter(q => (source==='all'||q.source===source) && (type==='all'||q.type===type));
  const chaps = uniq(qs.map(q=>q.chapter));
  $('chapterSel').innerHTML = '<option value="all">全部章节</option>' + chaps.map(c=>`<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
  if(chaps.includes(currentChap)) $('chapterSel').value = currentChap;
}
function applyFilters(keepCurrentId=null){
  updateChapterOptions();
  const source = $('sourceSel').value;
  const type = $('typeSel').value;
  const chapter = $('chapterSel').value;
  const kw = $('searchInput').value.trim().toLowerCase();
  filtered = QUESTIONS.filter(q=>{
    if(source !== 'all' && q.source !== source) return false;
    if(type !== 'all' && q.type !== type) return false;
    if(chapter !== 'all' && q.chapter !== chapter) return false;
    if($('wrongOnly').checked && statusOf(q) !== 'wrong') return false;
    if($('unansweredOnly').checked && statusOf(q) !== 'unanswered') return false;
    if(kw){
      const bag = [q.question,q.answerText,q.chapter,q.source,Object.values(q.options||{}).join(' ')].join(' ').toLowerCase();
      if(!bag.includes(kw)) return false;
    }
    return true;
  });
  if($('shuffleMode').checked) filtered = shuffle([...filtered]);
  if(keepCurrentId){
    const idx = filtered.findIndex(q=>q.id===keepCurrentId);
    current = idx >= 0 ? idx : Math.min(current, Math.max(0, filtered.length-1));
  } else {
    current = Math.min(current, Math.max(0, filtered.length-1));
  }
  showAnswer = false;
  render();
}
function shuffle(a){
  let seed = 1234567;
  const rand = () => (seed = (seed * 1664525 + 1013904223) >>> 0) / 4294967296;
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(rand()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function render(){
  $('totalPill').textContent = QUESTIONS.length;
  renderStats();
  renderCard();
  renderListIfNeeded();
}
function renderStats(){
  const allRec = Object.values(records);
  const done = allRec.filter(r=>r.status==='correct'||r.status==='wrong').length;
  const right = allRec.filter(r=>r.status==='correct').length;
  const wrong = allRec.filter(r=>r.status==='wrong').length;
  $('statTotal').textContent = filtered.length;
  $('statDone').textContent = done;
  $('statRight').textContent = right;
  $('statWrong').textContent = wrong;
  $('recordText').textContent = `本机记录：${done}题 / 错题 ${wrong}题`;
  $('posText').textContent = filtered.length ? `第 ${current+1} / ${filtered.length} 题` : '第 0 / 0 题';
  $('barFill').style.width = filtered.length ? `${Math.round((current+1)/filtered.length*100)}%` : '0%';
  $('prevBtn').disabled = current <= 0;
  $('nextBtn').disabled = current >= filtered.length - 1;
  $('submitBtn').disabled = filtered.length === 0;
  $('showBtn').disabled = filtered.length === 0;
  $('markWrongBtn').disabled = filtered.length === 0;
}
function renderCard(){
  const box = $('quizCard');
  if(!filtered.length){
    box.innerHTML = '<div class="empty">当前筛选条件下没有题目。可以取消“仅看错题/仅看未做”，或换一个章节。</div>';
    return;
  }
  const q = filtered[current];
  const rec = recordOf(q);
  const status = rec ? rec.status : 'unanswered';
  const inputType = isMulti(q) ? 'checkbox' : 'radio';
  const selectedLetters = rec?.selected || '';
  const tagClass = q.type==='多选'?'multi':(q.type==='判断'?'judge':'');
  const opts = Object.entries(q.options || {}).filter(([k,v])=>v !== '');
  const optionHtml = opts.map(([letter,text])=>{
    const checked = selectedLetters.includes(letter) ? 'checked' : '';
    const revealClass = showAnswer ? (q.answer.includes(letter) ? 'correct' : (selectedLetters.includes(letter) ? 'wrong' : '')) : '';
    return `<label class="opt ${revealClass}"><input class="ansInput" type="${inputType}" name="answer" value="${escapeHtml(letter)}" ${checked}><span class="letter">${escapeHtml(letter)}</span><span class="otext">${escapeHtml(text)}</span></label>`;
  }).join('');
  const resultClass = status === 'correct' ? 'ok' : (status === 'wrong' ? 'bad' : 'warn');
  const resultText = status === 'correct' ? '已答对' : (status === 'wrong' ? `已答错，你的答案：${selectedLetters || '未选择'}` : '未作答');
  box.innerHTML = `
    <div class="meta">
      <div>
        <span class="tag ${tagClass}">${escapeHtml(q.type)}</span>
        <span class="tag diff">${escapeHtml(q.source)}</span>
        ${q.difficulty ? `<span class="tag diff">难度：${escapeHtml(q.difficulty)}</span>` : ''}
      </div>
      <span class="tag diff">${escapeHtml(q.chapter)}｜第 ${q.num} 题</span>
    </div>
    <div class="qtitle">${escapeHtml(q.question)}</div>
    <div class="options">${optionHtml}</div>
    <div class="result ${resultClass}" id="resultText">${escapeHtml(resultText)}</div>
    <div class="answer ${showAnswer ? 'show' : ''}" id="answerBox">
      <div>正确答案：<span class="red">${escapeHtml(q.answer)}</span></div>
      <div>对应内容：${escapeHtml(q.answerText || '无')}</div>
    </div>
    ${q.note ? `<div class="note">核对备注：${escapeHtml(q.note)}</div>` : ''}
  `;
}
function renderListIfNeeded(){
  const box = $('listBox');
  if(!showingList){ box.className='list'; box.innerHTML=''; return; }
  box.className='list show';
  const items = filtered.map((q,i)=>{
    const st = statusOf(q);
    const stText = st==='correct'?'答对':(st==='wrong'?'错题':'未做');
    return `<div class="listitem" data-idx="${i}"><div class="mini">${i+1}. ${escapeHtml(q.source)}｜${escapeHtml(q.chapter)}｜${escapeHtml(q.type)}｜${stText}</div><h3>${escapeHtml(q.question)}</h3><button class="ghost jumpBtn" data-idx="${i}">跳转到本题</button></div>`;
  }).join('');
  box.innerHTML = items || '<div class="empty">没有可展开的题目。</div>';
  [...document.querySelectorAll('.jumpBtn')].forEach(btn=>btn.addEventListener('click',()=>{ current=Number(btn.dataset.idx); showAnswer=false; render(); window.scrollTo({top:0,behavior:'smooth'}); }));
}

function submitAnswer(){
  if(!filtered.length) return;
  const q = filtered[current];
  const selected = getSelected();
  if(!selected){
    $('resultText').textContent = '请先选择答案。';
    $('resultText').className = 'result warn';
    return;
  }
  const correct = selected === normLetters(q.answer.split(''));
  records[q.id] = {status: correct ? 'correct' : 'wrong', selected, time: Date.now()};
  saveRecords();
  if($('autoShow').checked || !correct) showAnswer = true;
  const keep = q.id;
  applyFilters(keep);
}
function toggleAnswer(){ showAnswer = !showAnswer; render(); }
function markWrong(){
  if(!filtered.length) return;
  const q = filtered[current];
  records[q.id] = {status:'wrong', selected:getSelected(), time:Date.now(), manual:true};
  saveRecords();
  applyFilters(q.id);
}
function resetRecords(){
  if(confirm('确认清空本机全部练习记录和错题记录？')){ records={}; saveRecords(); applyFilters(); }
}

['sourceSel','typeSel','chapterSel'].forEach(id=>$(id).addEventListener('change',()=>{ current=0; applyFilters(); }));
$('searchInput').addEventListener('input',()=>{ current=0; applyFilters(); });
['wrongOnly','unansweredOnly','shuffleMode'].forEach(id=>$(id).addEventListener('change',()=>{ current=0; applyFilters(); }));
$('prevBtn').addEventListener('click',()=>{ if(current>0){current--;showAnswer=false;render();} });
$('nextBtn').addEventListener('click',()=>{ if(current<filtered.length-1){current++;showAnswer=false;render();} });
$('submitBtn').addEventListener('click',submitAnswer);
$('showBtn').addEventListener('click',toggleAnswer);
$('markWrongBtn').addEventListener('click',markWrong);
$('resetBtn').addEventListener('click',resetRecords);
$('toggleListBtn').addEventListener('click',()=>{ showingList=!showingList; $('toggleListBtn').textContent=showingList?'收起题目列表':'展开题目列表'; renderListIfNeeded(); });
document.addEventListener('keydown', (e)=>{
  if(e.target && ['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName)) return;
  if(e.key==='ArrowLeft') $('prevBtn').click();
  if(e.key==='ArrowRight') $('nextBtn').click();
  if(e.key==='Enter') $('submitBtn').click();
  if(e.key.toLowerCase()==='a') $('showBtn').click();
});
initFilters();
applyFilters();
</script>
</body>
</html>
